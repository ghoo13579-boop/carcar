<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 소모품 관리</title>
    <style>
        :root {
            --bg: #0f0f1a; --card: #1a1a2e; --primary: #4361ee;
            --success: #06d6a0; --warning: #fb8500; --danger: #f72585;
            --fg: #e0e0ff; --muted: #8888aa; --border: #2a2a4a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--fg); padding: 15px; padding-bottom: 50px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; background: #0b0b18; border: 1px solid var(--border); color: #fff; border-radius: 10px; font-size: 16px; margin-bottom: 10px; outline: none; }
        
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .item-name { font-weight: bold; font-size: 17px; }
        .percent { font-size: 18px; font-weight: 800; }
        
        .gauge-bg { height: 8px; background: #2a2a4a; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .gauge-fill { height: 100%; transition: width 0.5s ease-in-out; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-edit { background: #2d3748; color: #ccc; }
        
        .history-list { margin-top: 10px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; }
        .history-item { display: flex; justify-content: space-between; margin-bottom: 3px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 380px; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; padding: 20px 0;"><h1>🚗 자동차 소모품 관리</h1></div>

        <div class="card">
            <label>차량 유형</label>
            <select id="typeSelect" onchange="changeType()">
                <option value="ice">내연기관</option>
                <option value="ev">전기차</option>
                <option value="fcev">수소차</option>
            </select>
            <label>현재 주행거리 (km)</label>
            <input type="number" id="currentKm" oninput="saveKm()">
        </div>

        <div id="itemList"></div>
        <button class="btn btn-edit" style="width:100%; padding:15px; border:1px dashed var(--success); color:var(--success); background:none;" onclick="openModal(true)">+ 소모품 항목 추가</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom:15px;">항목 추가/수정</h3>
            <label>소모품 이름</label><input type="text" id="inName">
            <label>교체 주기 (km) *없으면 0</label><input type="number" id="inKm">
            <label>교체 주기 (개월) *없으면 0</label><input type="number" id="inMonth">
            <div class="btn-group">
                <button class="btn btn-edit" onclick="closeModal()">취소</button>
                <button class="btn btn-main" onclick="saveItem()">저장</button>
            </div>
        </div>
    </div>

    <script>
        const presets = {
            ice: [
                { id: 1, name: "엔진오일", km: 7500, month: 6 },
                { id: 2, name: "와이퍼 블레이드", km: 0, month: 6 }, // 개월수 전용 예시
                { id: 3, name: "배터리 (12V)", km: 0, month: 36 }  // 개월수 전용 예시
            ],
            ev: [{ id: 4, name: "감속기 오일", km: 120000, month: 0 }],
            fcev: [{ id: 5, name: "이온 필터", km: 60000, month: 0 }]
        };

        let currentType = 'ice';
        let editId = null;

        function render() {
            const list = document.getElementById('itemList');
            const nowKm = parseInt(document.getElementById('currentKm').value) || 0;
            const now = new Date();
            list.innerHTML = '';

            let items = JSON.parse(localStorage.getItem(`items_${currentType}`)) || presets[currentType];
            localStorage.setItem(`items_${currentType}`, JSON.stringify(items));

            items.forEach(item => {
                const history = JSON.parse(localStorage.getItem(`h_${item.id}`)) || [];
                const last = history[0] || { km: 0, date: new Date(2000,0,1).toISOString() };
                
                // 1. 거리 기준 계산
                let kmPer = item.km > 0 ? ((nowKm - last.km) / item.km) * 100 : 0;
                
                // 2. 개월수 기준 계산
                const lastDate = new Date(last.date);
                const diffMonth = (now.getFullYear() - lastDate.getFullYear()) * 12 + (now.getMonth() - lastDate.getMonth());
                let monthPer = item.month > 0 ? (diffMonth / item.month) * 100 : 0;

                // 3. 둘 중 더 큰 퍼센트 적용 (개월만 있으면 개월만 적용됨)
                let per = Math.min(Math.max(Math.max(kmPer, monthPer), 0), 100);
                const color = per > 90 ? 'var(--danger)' : (per > 70 ? 'var(--warning)' : 'var(--success)');

                let historyHtml = history.slice(0, 3).map(h => `
                    <div class="history-item">
                        <span>${new Date(h.date).toLocaleDateString()}</span>
                        <span>${h.km.toLocaleString()} km</span>
                    </div>
                `).join('');

                list.innerHTML += `
                    <div class="card">
                        <div class="item-header">
                            <div>
                                <div class="item-name">${item.name}</div>
                                <div style="font-size:11px; color:var(--muted)">주기: ${item.km > 0 ? item.km.toLocaleString()+'km' : ''} ${item.month > 0 ? item.month+'개월' : ''}</div>
                            </div>
                            <div class="percent" style="color:${color}">${Math.floor(per)}%</div>
                        </div>
                        <div class="gauge-bg"><div class="gauge-fill" style="width:${per}%; background:${color}"></div></div>
                        <div class="btn-group">
                            <button class="btn btn-main" onclick="done(${item.id})">교체완료</button>
                            <button class="btn btn-edit" onclick="openModal(false, ${item.id})">수정</button>
                        </div>
                        ${history.length > 0 ? `<div class="history-list"><div style="margin-bottom:5px;">최근 교체 내역</div>${historyHtml}</div>` : ''}
                    </div>
                `;
            });
        }

        // 교체 완료 시 내역(History)에 누적 저장
        function done(id) {
            const cur = parseInt(document.getElementById('currentKm').value) || 0;
            let history = JSON.parse(localStorage.getItem(`h_${id}`)) || [];
            history.unshift({ km: cur, date: new Date().toISOString() });
            localStorage.setItem(`h_${id}`, JSON.stringify(history.slice(0, 10))); // 최근 10개만 저장
            render();
        }

        function saveKm() { localStorage.setItem('u_km', document.getElementById('currentKm').value); render(); }
        function changeType() { currentType = document.getElementById('typeSelect').value; localStorage.setItem('u_type', currentType); render(); }
        function openModal(isAdd, id = null) {
            if(!isAdd) {
                const items = JSON.parse(localStorage.getItem(`items_${currentType}`));
                const item = items.find(i => i.id === id);
                document.getElementById('inName').value = item.name;
                document.getElementById('inKm').value = item.km;
                document.getElementById('inMonth').value = item.month;
                editId = id;
            } else {
                document.getElementById('inName').value = '';
                document.getElementById('inKm').value = '';
                document.getElementById('inMonth').value = '';
                editId = null;
            }
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function saveItem() {
            const name = document.getElementById('inName').value;
            const km = parseInt(document.getElementById('inKm').value) || 0;
            const month = parseInt(document.getElementById('inMonth').value) || 0;
            let items = JSON.parse(localStorage.getItem(`items_${currentType}`));
            if(editId) items = items.map(i => i.id === editId ? {...i, name, km, month} : i);
            else items.push({ id: Date.now(), name, km, month });
            localStorage.setItem(`items_${currentType}`, JSON.stringify(items));
            closeModal(); render();
        }

        window.onload = () => {
            document.getElementById('currentKm').value = localStorage.getItem('u_km') || 0;
            currentType = localStorage.getItem('u_type') || 'ice';
            document.getElementById('typeSelect').value = currentType;
            render();
        };
    </script>
</body>
</html>
