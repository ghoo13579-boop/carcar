<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 소모품 관리</title>
    <style>
        :root {
            --bg: #0f0f1a; --card: #1a1a2e; --primary: #4361ee;
            --success: #06d6a0; --warning: #fb8500; --danger: #f72585;
            --fg: #e0e0ff; --muted: #8888aa; --border: #2a2a4a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--fg); padding: 15px; line-height: 1.5; padding-bottom: 40px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
        select, input { width: 100%; padding: 12px; background: #0b0b18; border: 1px solid var(--border); color: #fff; border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 10px; }
        
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .item-name { font-weight: bold; font-size: 17px; }
        .percent { font-size: 18px; font-weight: 800; }
        .gauge-bg { height: 8px; background: #2a2a4a; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .gauge-fill { height: 100%; transition: width 0.5s ease-in-out; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; padding: 11px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-edit { background: #2d3748; color: #ccc; }
        .btn-danger { background: rgba(247, 37, 133, 0.15); color: var(--danger); flex: 0.4; }
        .btn-add { width: 100%; background: #1a1a2e; color: var(--success); border: 1px dashed var(--success); padding: 15px; margin-top: 10px; border-radius: 12px; font-size: 15px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 380px; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🚗 자동차 소모품 관리</h1></div>

        <div class="card">
            <label>차량 유형</label>
            <select id="typeSelect" onchange="changeType()">
                <option value="ice">⛽ 내연기관 (가솔린/디젤/LPG)</option>
                <option value="ev">⚡ 전기차 (EV)</option>
                <option value="fcev">💧 수소차 (FCEV)</option>
            </select>
            <label>현재 누적 주행거리 (km)</label>
            <input type="number" id="currentKm" placeholder="현재 주행거리를 입력하세요" oninput="saveKm()">
        </div>

        <div id="itemList"></div>
        <button class="btn btn-add" onclick="openModal(true)">+ 항목 직접 추가하기</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">항목 추가</h3>
            <label>소모품 이름</label>
            <input type="text" id="inName">
            <label>교체 주기 (km)</label>
            <input type="number" id="inKm">
            <label>교체 주기 (개월)</label>
            <input type="number" id="inMonth">
            <div class="btn-group">
                <button class="btn btn-edit" onclick="closeModal()">취소</button>
                <button class="btn btn-main" onclick="saveItem()">저장</button>
            </div>
        </div>
    </div>

    <script>
        // 기본 권장 데이터 세트
        const presets = {
            ice: [
                { id: 1, name: "엔진오일 & 필터", km: 7500, month: 6 },
                { id: 2, name: "에어컨 필터", km: 10000, month: 6 },
                { id: 3, name: "브레이크 패드", km: 40000, month: 0 },
                { id: 4, name: "브레이크 액", km: 40000, month: 24 },
                { id: 5, name: "타이어 위치 교환", km: 10000, month: 12 },
                { id: 6, name: "냉각수(부동액)", km: 200000, month: 120 },
                { id: 7, name: "배터리(12V)", km: 0, month: 36 },
                { id: 8, name: "점화 플러그", km: 70000, month: 0 },
                { id: 9, name: "미션 오일", km: 80000, month: 0 }
            ],
            ev: [
                { id: 10, name: "에어컨 필터", km: 15000, month: 12 },
                { id: 11, name: "브레이크 액", km: 40000, month: 24 },
                { id: 12, name: "감속기 오일", km: 120000, month: 0 },
                { id: 13, name: "전기차 전용 냉각수", km: 200000, month: 120 },
                { id: 14, name: "타이어 (EV 전용)", km: 10000, month: 12 },
                { id: 15, name: "브레이크 패드", km: 80000, month: 0 }
            ],
            fcev: [
                { id: 16, name: "이온 필터", km: 60000, month: 0 },
                { id: 17, name: "에어컨 필터", km: 15000, month: 12 },
                { id: 18, name: "수소차 전용 냉각수", km: 200000, month: 120 },
                { id: 19, name: "브레이크 액", km: 40000, month: 24 },
                { id: 20, name: "스택 매니폴드 가스켓", km: 100000, month: 0 }
            ]
        };

        let currentType = 'ice';
        let editId = null;

        function render() {
            const list = document.getElementById('itemList');
            const km = parseInt(document.getElementById('currentKm').value) || 0;
            list.innerHTML = '';

            let items = JSON.parse(localStorage.getItem(`items_${currentType}`));
            if (!items) {
                items = presets[currentType];
                localStorage.setItem(`items_${currentType}`, JSON.stringify(items));
            }

            items.forEach(item => {
                const last = JSON.parse(localStorage.getItem(`last_${item.id}`)) || { km: 0 };
                const diffKm = km - last.km;
                const per = item.km > 0 ? Math.min(Math.max((diffKm / item.km) * 100, 0), 100) : 0;
                const color = per > 90 ? 'var(--danger)' : (per > 70 ? 'var(--warning)' : 'var(--success)');

                list.innerHTML += `
                    <div class="card">
                        <div class="item-header">
                            <div>
                                <div class="item-name">${item.name}</div>
                                <div style="font-size:11px; color:var(--muted)">주기: ${item.km.toLocaleString()}km / ${item.month}개월</div>
                            </div>
                            <div class="percent" style="color:${color}">${Math.floor(per)}%</div>
                        </div>
                        <div class="gauge-bg"><div class="gauge-fill" style="width:${per}%; background:${color}"></div></div>
                        <div class="btn-group">
                            <button class="btn btn-main" onclick="done(${item.id})">교체 완료</button>
                            <button class="btn btn-edit" onclick="openModal(false, ${item.id})">수정</button>
                            <button class="btn btn-danger" onclick="deleteItem(${item.id})">삭제</button>
                        </div>
                    </div>
                `;
            });
        }

        function saveKm() { localStorage.setItem('u_km', document.getElementById('currentKm').value); render(); }
        function changeType() { currentType = document.getElementById('typeSelect').value; localStorage.setItem('u_type', currentType); render(); }

        function openModal(isAdd, id = null) {
            if(!isAdd) {
                const items = JSON.parse(localStorage.getItem(`items_${currentType}`));
                const item = items.find(i => i.id === id);
                document.getElementById('inName').value = item.name;
                document.getElementById('inKm').value = item.km;
                document.getElementById('inMonth').value = item.month;
                editId = id;
                document.getElementById('modalTitle').innerText = "항목 수정";
            } else {
                document.getElementById('inName').value = '';
                document.getElementById('inKm').value = '';
                document.getElementById('inMonth').value = '';
                editId = null;
                document.getElementById('modalTitle').innerText = "새 항목 추가";
            }
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function saveItem() {
            const name = document.getElementById('inName').value;
            const km = parseInt(document.getElementById('inKm').value) || 0;
            const month = parseInt(document.getElementById('inMonth').value) || 0;
            if(!name) return alert('이름을 입력하세요');

            let items = JSON.parse(localStorage.getItem(`items_${currentType}`));
            if(editId) {
                items = items.map(i => i.id === editId ? {...i, name, km, month} : i);
            } else {
                items.push({ id: Date.now(), name, km, month });
            }
            localStorage.setItem(`items_${currentType}`, JSON.stringify(items));
            closeModal(); render();
        }

        function deleteItem(id) {
            if(!confirm('삭제하시겠습니까?')) return;
            let items = JSON.parse(localStorage.getItem(`items_${currentType}`));
            items = items.filter(i => i.id !== id);
            localStorage.setItem(`items_${currentType}`, JSON.stringify(items));
            render();
        }

        function done(id) {
            const cur = document.getElementById('currentKm').value || 0;
            localStorage.setItem(`last_${id}`, JSON.stringify({ km: parseInt(cur) }));
            render();
        }

        window.onload = () => {
            document.getElementById('currentKm').value = localStorage.getItem('u_km') || 0;
            currentType = localStorage.getItem('u_type') || 'ice';
            document.getElementById('typeSelect').value = currentType;
            render();
        };
    </script>
</body>
</html>
