<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>자동차 소모품 관리</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--primary:#4361ee;--success:#06d6a0;--warning:#fb8500;--danger:#f72585;--fg:#e0e0ff;--muted:#8888aa;--border:#2a2a4a;--secondary:#2a2a4a;--gauge-track:#2a2a4a;--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;padding-bottom:40px}
.header{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.header-inner{max-width:600px;margin:0 auto;padding:16px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:22px;font-weight:700}
.urgent-badge{display:flex;align-items:center;gap:4px;background:var(--danger);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.urgent-badge.hidden{display:none}
.main{max-width:600px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border-radius:var(--radius);padding:14px 16px}
.selector-btn{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:opacity .15s}
.selector-btn:hover{opacity:.85}
.selector-left{display:flex;flex-direction:column;gap:2px}
.selector-brand{font-size:12px;color:var(--muted)}
.selector-name{font-size:20px;font-weight:700}
.selector-right{display:flex;align-items:center;gap:8px}
.type-badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px;background:rgba(67,97,238,.15);color:var(--primary)}
.type-badge.ev{background:rgba(6,214,160,.15);color:var(--success)}
.type-badge.hybrid{background:rgba(168,218,220,.15);color:#a8dadc}
.chevron{font-size:12px;color:var(--muted);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.picker-container{max-height:380px;overflow-y:auto;padding:8px}
.picker-container.hidden{display:none}
.brand-header{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;padding:8px 12px 4px}
.picker-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s}
.picker-item:hover{background:rgba(67,97,238,.1)}
.picker-item.active{background:rgba(67,97,238,.18)}
.picker-item.active .picker-name{color:var(--primary);font-weight:600}
.picker-name{font-size:15px}
.mini-type-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px}
.car-image-card{height:180px;border-radius:16px;padding:16px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(135deg,#1a237e,#283593)}
.car-card-top{display:flex;align-items:center;justify-content:space-between}
.car-logo{width:40px;height:40px;border-radius:20px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
.car-type-badge{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:12px;padding:4px 10px;border-radius:20px}
.car-card-center{display:flex;align-items:center;justify-content:center;flex:1}
.car-shape{font-size:56px;opacity:.7}
.car-card-bottom{display:flex;flex-direction:column;gap:2px}
.car-brand-label{font-size:11px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1.5px}
.car-name-label{font-size:22px;font-weight:700;color:#fff}
.mileage-card{display:flex;align-items:center;justify-content:space-between}
.mileage-left{display:flex;align-items:center;gap:8px}
.mileage-icon{font-size:16px}
.mileage-label{font-size:14px;color:var(--muted);white-space:nowrap}
.mileage-right{display:flex;align-items:center;gap:6px}
.mileage-input{background:transparent;border:none;outline:none;font-size:22px;font-weight:700;color:var(--fg);text-align:right;width:120px;font-family:inherit}
.mileage-input::placeholder{color:var(--muted)}
.mileage-input::-webkit-inner-spin-button,.mileage-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.mileage-unit{font-size:14px;color:var(--muted)}
.section-header{padding:4px 2px}
.section-title{font-size:17px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:12px;color:var(--muted)}
.consumable-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;border-left:3px solid transparent;transition:border-color .3s}
.consumable-card.warn{border-left-color:var(--warning)}
.consumable-card.danger{border-left-color:var(--danger)}
.cons-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.cons-left{flex:1;min-width:0;margin-right:8px}
.cons-name{font-size:15px;font-weight:600}
.cons-note{font-size:11px;color:var(--muted);margin-top:2px}
.cons-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.status-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
.status-good{background:rgba(6,214,160,.15);color:var(--success)}
.status-warn{background:rgba(251,133,0,.15);color:var(--warning)}
.status-danger{background:rgba
