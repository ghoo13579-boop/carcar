<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자동차 소모품 관리</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --primary: #3f51b5;
            --text: #ffffff; --success: #4caf50; --warning: #ff9800; --danger: #f44336;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 480px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { font-size: 22px; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #bbb; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #2c2c2c; color: #fff; margin-bottom: 15px; font-size: 16px; }
        .item-row { border-top: 1px solid #333; padding-top: 15px; margin-top: 15px; }
        .item-info { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .gauge-bg { background: #333; height: 10px; border-radius: 5px; overflow: hidden; }
        .gauge-fill { height: 100%; transition: width 0.3s; }
        .btn-reset { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .btn-reset:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 자동차 소모품 관리</h1>
        
        <div class="card">
            <label>차종 선택</label>
            <select id="carSelect" onchange="renderItems()">
                <option value="sonata">현대 쏘나타</option>
                <option value="avante">현대 아반떼</option>
                <option value="g80">제네시스 G80</option>
                <option value="ev6">기아 EV6 (전기차)</option>
            </select>
            
            <label>현재 주행거리 (km)</label>
            <input type="number" id="currentKm" value="0" oninput="updateMileage()">
        </div>

        <div id="itemList"></div>
    </div>

    <script>
        const db = {
            sonata: [{n:"엔진오일", d:7500}, {n:"에어컨필터", d:10000}, {n:"브레이크패드", d:40000}],
            avante: [{n:"엔진오일", d:10000}, {n:"에어컨필터", d:10000}],
            g80: [{n:"엔진오일", d:10000}, {n:"브레이크액", d:40000}],
            ev6: [{n:"감속기오일", d:120000}, {n:"에어컨필터", d:15000}]
        };

        function renderItems() {
            const car = document.getElementById('carSelect').value;
            const current = parseInt(document.getElementById('currentKm').value) || 0;
            const list = document.getElementById('itemList');
            list.innerHTML = '';

            db[car].forEach((item, i) => {
                const last = localStorage.getItem(`${car}_${i}`) || 0;
                const diff = current - last;
                let per = Math.min(Math.max((diff / item.d) * 100, 0), 100);
                let color = per > 90 ? 'var(--danger)' : (per > 70 ? 'var(--warning)' : 'var(--success)');

                list.innerHTML += `
                    <div class="card">
                        <div class="item-info">
                            <strong>${item.n}</strong>
                            <span style="color:${color}">${Math.floor(per)}%</span>
                        </div>
                        <div class="gauge-bg">
                            <div class="gauge-fill" style="width:${per}%; background:${color}"></div>
                        </div>
                        <p style="font-size:12px; color:#aaa; margin-top:8px;">다음 교체까지 약 ${Math.max(item.d - diff, 0)}km 남음</p>
                        <button class="btn-reset" onclick="resetItem('${car}', ${i})">교체 완료</button>
                    </div>
                `;
            });
        }

        function updateMileage() {
            localStorage.setItem('my_km', document.getElementById('currentKm').value);
            renderItems();
        }

        function resetItem(car, i) {
            localStorage.setItem(`${car}_${i}`, document.getElementById('currentKm').value);
            renderItems();
        }

        window.onload = () => {
            document.getElementById('currentKm').value = localStorage.getItem('my_km') || 0;
            renderItems();
        };
    </script>
</body>
</html>
