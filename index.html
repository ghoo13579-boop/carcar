<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 소모품 관리</title>
    <style>
        :root {
            --bg: #0f0f1a; --card: #1a1a2e; --primary: #4361ee;
            --success: #06d6a0; --warning: #fb8500; --danger: #f72585;
            --fg: #e0e0ff; --muted: #8888aa; --border: #2a2a4a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--fg); padding: 15px; line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 헤더 & 입력창 */
        .header { text-align: center; padding: 20px 0; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        h1 { font-size: 22px; margin-bottom: 5px; }
        label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
        select, input, textarea { width: 100%; padding: 12px; background: #0b0b18; border: 1px solid var(--border); color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        
        /* 소모품 카드 */
        .item-card { position: relative; overflow: hidden; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .item-name { font-weight: bold; font-size: 17px; }
        .percent { font-size: 18px; font-weight: 800; }
        
        /* 게이지 */
        .gauge-bg { height: 8px; background: #2a2a4a; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .gauge-fill { height: 100%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 버튼 */
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-edit { background: #2d3748; color: var(--muted); }
        .btn:active { opacity: 0.7; transform: scale(0.98); }

        /* 편집 모달 (사용자 주기 수정) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 자동차 소모품 관리</h1>
        </div>

        <div class="card">
            <label>내 차종 선택</label>
            <select id="carSelect" onchange="changeCar()">
                <option value="sonata">현대 쏘나타</option>
                <option value="avante">현대 아반떼</option>
                <option value="grandeur">현대 그랜저</option>
                <option value="g80">제네시스 G80</option>
                <option value="ev6">기아 EV6 (전기차)</option>
                <option value="model3">테슬라 모델3</option>
            </select>
            
            <div style="margin-top:15px;">
                <label>현재 총 주행거리 (km)</label>
                <input type="number" id="currentKm" placeholder="예: 45000" oninput="updateAll()">
            </div>
        </div>

        <div id="itemList"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="editTitle" style="margin-bottom:20px;">주기 수정</h3>
            <label>교체 주기 (km)</label>
            <input type="number" id="editKm" style="margin-bottom:15px;">
            <label>교체 주기 (개월)</label>
            <input type="number" id="editMonth" style="margin-bottom:20px;">
            <div class="btn-group">
                <button class="btn btn-edit" onclick="closeModal()">취소</button>
                <button class="btn btn-main" onclick="saveCustomInterval()">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        // 기본 데이터 (차종별 소모품)
        const baseData = {
            sonata: [
                { id: 'oil', name: "엔진오일", km: 7500, month: 6 },
                { id: 'air', name: "에어컨 필터", km: 10000, month: 6 },
                { id: 'brake', name: "브레이크 액", km: 40000, month: 24 }
            ],
            avante: [
                { id: 'oil', name: "엔진오일", km: 10000, month: 12 },
                { id: 'air', name: "에어컨 필터", km: 10000, month: 6 }
            ],
            ev6: [
                { id: 'gear', name: "감속기 오일", km: 120000, month: 0 },
                { id: 'air', name: "에어컨 필터", km: 15000, month: 12 }
            ]
        };

        let editingId = null;

        // 초기화 및 데이터 로드
        function init() {
            const savedKm = localStorage.getItem('user_km');
            const savedCar = localStorage.getItem('user_car');
            if (savedKm) document.getElementById('currentKm').value = savedKm;
            if (savedCar) document.getElementById('carSelect').value = savedCar;
            updateAll();
        }

        function changeCar() {
            localStorage.setItem('user_car', document.getElementById('carSelect').value);
            updateAll();
        }

        function updateAll() {
            const carType = document.getElementById('carSelect').value;
            const currentKm = parseInt(document.getElementById('currentKm').value) || 0;
            localStorage.setItem('user_km', currentKm);

            const container = document.getElementById('itemList');
            container.innerHTML = '';

            // 해당 차종 데이터 가져오기 (없으면 쏘나타 기본)
            const items = baseData[carType] || baseData['sonata'];

            items.forEach((item) => {
                // 사용자 정의 주기 확인
                const custom = JSON.parse(localStorage.getItem(`custom_${carType}_${item.id}`)) || {};
                const targetKm = custom.km || item.km;
                const targetMonth = custom.month || item.month;

                // 마지막 교체 기록 확인
                const last = JSON.parse(localStorage.getItem(`last_${carType}_${item.id}`)) || { km: 0, date: new Date().toISOString() };
                
                const diffKm = currentKm - last.km;
                let percent = Math.min(Math.max((diffKm / targetKm) * 100, 0), 100);
                
                const color = percent > 90 ? 'var(--danger)' : (percent > 70 ? 'var(--warning)' : 'var(--success)');

                container.innerHTML += `
                    <div class="card item-card">
                        <div class="item-header">
                            <div>
                                <div class="item-name">${item.name}</div>
                                <div style="font-size:12px; color:var(--muted)">주기: ${targetKm.toLocaleString()}km / ${targetMonth}개월</div>
                            </div>
                            <div class="percent" style="color:${color}">${Math.floor(percent)}%</div>
                        </div>
                        <div class="gauge-bg">
                            <div class="gauge-fill" style="width:${percent}%; background:${color}"></div>
                        </div>
                        <div style="font-size:12px; color:var(--muted)">다음 교체까지 약 ${Math.max(targetKm - diffKm, 0).toLocaleString()}km 남음</div>
                        <div class="btn-group">
                            <button class="btn btn-main" onclick="recordDone('${carType}', '${item.id}')">교체 완료</button>
                            <button class="btn btn-edit" onclick="openModal('${carType}', '${item.id}', '${item.name}', ${targetKm}, ${targetMonth})">주기 수정</button>
                        </div>
                    </div>
                `;
            });
        }

        // 교체 기록 저장
        function recordDone(car, id) {
            const current = document.getElementById('currentKm').value || 0;
            localStorage.setItem(`last_${car}_${id}`, JSON.stringify({ km: parseInt(current), date: new Date().toISOString() }));
            updateAll();
            alert('기록되었습니다!');
        }

        // 모달 제어
        function openModal(car, id, name, km, month) {
            editingId = { car, id };
            document.getElementById('editTitle').innerText = `${name} 주기 수정`;
            document.getElementById('editKm').value = km;
            document.getElementById('editMonth').value = month;
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveCustomInterval() {
            const km = parseInt(document.getElementById('editKm').value);
            const month = parseInt(document.getElementById('editMonth').value);
            localStorage.setItem(`custom_${editingId.car}_${editingId.id}`, JSON.stringify({ km, month }));
            closeModal();
            updateAll();
        }

        window.onload = init;
    </script>
</body>
</html>
