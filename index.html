<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 소모품 관리</title>
    <style>
        :root {
            --bg: #0f0f1a; --card: #1a1a2e; --primary: #4361ee;
            --success: #06d6a0; --warning: #fb8500; --danger: #f72585;
            --fg: #e0e0ff; --muted: #8888aa; --border: #2a2a4a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--fg); padding: 15px; line-height: 1.5; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; background: #0b0b18; border: 1px solid var(--border); color: #fff; border-radius: 10px; font-size: 16px; margin-bottom: 10px; outline: none; }
        
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .item-name { font-weight: bold; font-size: 17px; }
        .percent { font-size: 18px; font-weight: 800; }
        
        .gauge-bg { height: 8px; background: #2a2a4a; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .gauge-fill { height: 100%; transition: width 0.5s ease-in-out; }
        
        .next-info { font-size: 13px; color: var(--warning); margin-bottom: 10px; font-weight: 600; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-edit { background: #2d3748; color: #ccc; }
        .btn-reset { background: rgba(247, 37, 133, 0.1); color: var(--danger); border: 1px solid rgba(247, 37, 133, 0.3); margin-top: 30px; padding: 15px; width: 100%; border-radius: 12px; }
        
        .history-list { margin-top: 12px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; }
        .history-item { display: flex; justify-content: space-between; margin-bottom: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 380px; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; padding: 20px 0;"><h1>🚗 자동차 소모품 관리</h1></div>

        <div class="card">
            <label>차량 유형</label>
            <select id="typeSelect" onchange="changeType()">
                <option value="ice">내연기관</option>
                <option value="ev">전기차</option>
                <option value="fcev">수소차</option>
            </select>
            <label>현재 총 주행거리 (km)</label>
            <input type="number" id="currentKm" placeholder="현재 키로수 입력" oninput="saveKm()">
        </div>

        <div id="itemList"></div>

        <button class="btn btn-edit" style="width:100%; padding:15px; border:1px dashed var(--success); color:var(--success); background:none; margin-top: 10px;" onclick="openItemModal(true)">+ 소모품 항목 직접 추가</button>

        <button class="btn btn-reset" onclick="resetAllData()">⚠️ 전체 데이터 초기화</button>
    </div>

    <div id="doneModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">교체 내역 등록</h3>
            <label>교체 당시 주행거리 (km)</label>
            <input type="number" id="doneKm">
            <label>교체한 날짜</label>
            <input type="date" id="doneDate">
            <div class="btn-group">
                <button class="btn btn-edit" onclick="closeDoneModal()">취소</button>
                <button class="btn btn-main" onclick="saveDone()">등록하기</button>
            </div>
        </div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom:15px;">항목 설정</h3>
            <label>소모품 이름</label><input type="text" id="inName">
            <label>교체 주기 (km)</label><input type="number" id="inKm">
            <label>교체 주기 (개월)</label><input type="number" id="inMonth">
            <div class="btn-group">
                <button class="btn btn-edit" onclick="closeItemModal()">취소</button>
                <button class="btn btn-main" onclick="saveItem()">저장</button>
                <button id="deleteBtn" class="btn" style="background:var(--danger); color:white; display:none;" onclick="deleteItem()">삭제</button>
            </div>
        </div>
    </div>

    <script>
        const presets = {
            ice: [
                { id: 1, name: "엔진오일", km: 7500, month: 6 },
                { id: 2, name: "와이퍼 블레이드", km: 0, month: 6 },
                { id: 3, name: "에어컨 필터", km: 10000, month: 6 }
            ],
            ev: [{ id: 4, name: "감속기 오일", km: 120000, month: 0 }],
            fcev: [{ id: 5, name: "이온 필터", km: 60000, month: 0 }]
        };

        let currentType = 'ice';
        let editId = null;
        let activeItemId = null;

        function render() {
            const list = document.getElementById('itemList');
            const nowKm = parseInt(document.getElementById('currentKm').value) || 0;
            const now = new Date();
            list.innerHTML = '';

            let items = JSON.parse(localStorage.getItem(`items_${currentType}`)) || presets[currentType];
            localStorage.setItem(`items_${currentType}`, JSON.stringify(items));

            items.forEach(item => {
                const history = JSON.parse(localStorage.getItem(`h_${item.id}`)) || [];
                const last = history[0] || { km: 0, date: now.toISOString() };
                
                let kmPer = item.km > 0 ? ((nowKm - last.km) / item.km) * 100 : 0;
                const lastDate = new Date(last.date);
                const diffMonth = (now - lastDate) / (1000 * 60 * 60 * 24 * 30.44);
                let monthPer = item.month > 0 ? (diffMonth / item.month) * 100 : 0;

                let per = Math.min(Math.max(Math.max(kmPer, monthPer), 0), 100);
                const color = per > 90 ? 'var(--danger)' : (per > 70 ? 'var(--warning)' : 'var(--success)');

                let nextInfo = "";
                if (item.km > 0) nextInfo += `${(last.km + item.km).toLocaleString()}km `;
                if (item.month > 0) {
                    const nextDate = new Date(lastDate);
                    nextDate.setMonth(nextDate.getMonth() + item.month);
                    nextInfo += `(${nextDate.toLocaleDateString()} 까지)`;
                }

                list.innerHTML += `
                    <div class="card">
                        <div class="item-header">
                            <div>
                                <div class="item-name">${item.name}</div>
                                <div style="font-size:11px; color:var(--muted)">주기: ${item.km > 0 ? item.km.toLocaleString()+'km' : ''} ${item.month > 0 ? item.month+'개월' : ''}</div>
                            </div>
                            <div class="percent" style="color:${color}">${Math.floor(per)}%</div>
                        </div>
                        <div class="gauge-bg"><div class="gauge-fill" style="width:${per}%; background:${color}"></div></div>
                        <div class="next-info">🔔 예정: ${nextInfo}</div>
                        <div class="btn-group">
                            <button class="btn btn-main" onclick="openDoneModal(${item.id})">교체 기록</button>
                            <button class="btn btn-edit" onclick="openItemModal(false, ${item.id})">수정/삭제</button>
                        </div>
                        ${history.length > 0 ? `<div class="history-list"><div style="font-weight:bold; margin-bottom:5px;">기록</div>${history.slice(0,2).map(h=>`<div class="history-item"><span>${new Date(h.date).toLocaleDateString()}</span><span>${h.km.toLocaleString()}km</span></div>`).join('')}</div>` : ''}
                    </div>
                `;
            });
        }

        // 초기화 함수
        function resetAllData() {
            if (confirm("정말로 모든 데이터를 초기화할까요?\n저장된 주행거리와 모든 정비 기록이 삭제됩니다.")) {
                localStorage.clear();
                alert("초기화되었습니다.");
                location.reload();
            }
        }

        function openDoneModal(id) {
            activeItemId = id;
            document.getElementById('doneKm').value = document.getElementById('currentKm').value;
            document.getElementById('doneDate').value = new Date().toISOString().substring(0, 10);
            document.getElementById('doneModal').classList.add('active');
        }
        function closeDoneModal() { document.getElementById('doneModal').classList.remove('active'); }
        function saveDone() {
            const km = parseInt(document.getElementById('doneKm').value) || 0;
            const date = document.getElementById('doneDate').value;
            let history = JSON.parse(localStorage.getItem(`h_${activeItemId}`)) || [];
            history.unshift({ km, date: new Date(date).toISOString() });
            history.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem(`h_${activeItemId}`, JSON.stringify(history.slice(0, 10)));
            closeDoneModal(); render();
        }

        function saveKm() { localStorage.setItem('u_km', document.getElementById('currentKm').value); render(); }
        function changeType() { currentType = document.getElementById('typeSelect').value; localStorage.setItem('u_type', currentType); render(); }
        
        function openItemModal(isAdd, id = null) {
            const delBtn = document.getElementById('deleteBtn');
            if(!isAdd) {
                const items = JSON.parse(localStorage.getItem(`items_${currentType}`));
                const item = items.find(i => i.id === id);
                document.getElementById('inName').value = item.name;
                document.getElementById('inKm').value = item.km;
                document.getElementById('inMonth').value = item.month;
                editId = id;
                delBtn.style.display = "block";
            } else {
                document.getElementById('inName').value = '';
                document.getElementById('inKm').value = '';
                document.getElementById('inMonth').value = '';
                editId = null;
                delBtn.style.display = "none";
            }
            document.getElementById('itemModal').classList.add('active');
        }
        function closeItemModal() { document.getElementById('itemModal').classList.remove('active'); }
        
        function saveItem() {
            const name = document.getElementById('inName').value;
            const km = parseInt(document.getElementById('inKm').value) || 0;
            const month = parseInt(document.getElementById('inMonth').value) || 0;
            let items = JSON.parse(localStorage.getItem(`items_${currentType}`));
            if(editId) items = items.map(i => i.id === editId ? {...i, name, km, month} : i);
            else items.push({ id: Date.now(), name, km, month });
            localStorage.setItem(`items_${currentType}`, JSON.stringify(items));
            closeItemModal(); render();
        }

        function deleteItem() {
            if(!confirm("이 항목을 삭제하시겠습니까?")) return;
            let items = JSON.parse(localStorage.getItem(`items_${currentType}`));
            items = items.filter(i => i.id !== editId);
            localStorage.setItem(`items_${currentType}`, JSON.stringify(items));
            closeItemModal(); render();
        }

        window.onload = () => {
            document.getElementById('currentKm').value = localStorage.getItem('u_km') || 0;
            currentType = localStorage.getItem('u_type') || 'ice';
            document.getElementById('typeSelect').value = currentType;
            render();
        };
    </script>
</body>
</html>
